server:
  port: 38765
  tomcat:
    max-threads: 200
    min-spare-threads: 20
    accept-count: 100
    connection-timeout: 10000
    max-connections: 8192
    protocol:
      max-http-form-post-size: 50MB

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    serialization:
      indent-output: true
    deserialization:
      fail-on-missing-creator-properties: false
  datasource:
    url: ${CAT_TOOL_DB_URL:jdbc:mysql://127.0.0.1:3306/cat_tool?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${CAT_TOOL_DB_USERNAME:cat_tool}
    password: ${CAT_TOOL_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 10000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Shanghai
        jdbc.batch_size: 50
        jdbc.batch_versioned_data: true
        order_inserts: true
        order_updates: true
        generate_statistics: false
  mail:
    host: ${CAT_TOOL_MAIL_HOST:smtp.example.com}
    port: ${CAT_TOOL_MAIL_PORT:465}
    username: ${CAT_TOOL_MAIL_USERNAME:}
    password: ${CAT_TOOL_MAIL_PASSWORD:}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: false
            required: false
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
  data:
    redis:
      host: ${CAT_TOOL_REDIS_HOST:127.0.0.1}
      port: ${CAT_TOOL_REDIS_PORT:6379}
      password: ${CAT_TOOL_REDIS_PASSWORD:}
      database: ${CAT_TOOL_REDIS_DATABASE:0}
      timeout: 10000

cat-tool:
  upload-dir: ${CAT_TOOL_UPLOAD_DIR:uploads}
  auth:
    token-ttl-hours: ${CAT_TOOL_TOKEN_TTL_HOURS:168}
    jwt-secret: ${CAT_TOOL_JWT_SECRET:}
  mail:
    from: ${CAT_TOOL_MAIL_FROM:${CAT_TOOL_MAIL_USERNAME:no-reply@example.com}}
    from-name: ${CAT_TOOL_MAIL_FROM_NAME:猫爪工具}
    code-ttl-minutes: 3
    cooldown-seconds: 60
  verification:
    code-length: 6
    code-chars: "3456789ABCDEFGHJKMNPQRSTUVWXY"

logging:
  level:
    root: INFO
    com.jvxi.unity: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/cat-tool.log
    max-size: 10MB
    max-history: 30
