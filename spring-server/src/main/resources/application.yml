server:
  port: 38765
  tomcat:
    max-threads: 200
    min-spare-threads: 20
    accept-count: 100
    connection-timeout: 10000
    max-connections: 8192
    protocol:
      max-http-form-post-size: 50MB

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    serialization:
      indent-output: true
    deserialization:
      fail-on-missing-creator-properties: false
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/cat_tool?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: cat_tool
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 10000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Shanghai
        jdbc.batch_size: 50
        jdbc.batch_versioned_data: true
        order_inserts: true
        order_updates: true
        generate_statistics: false
  mail:
    host: smtp.example.com
    port: 465
    username:
    password:
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: false
            required: false
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      timeout: 10000

cat-tool:
  upload-dir: uploads
  auth:
    token-ttl-hours: 168
    jwt-secret:
  mail:
    from: no-reply@example.com
    from-name: 猫爪工具
    code-ttl-minutes: 3
    cooldown-seconds: 60
  verification:
    code-length: 6
    code-chars: "3456789ABCDEFGHJKMNPQRSTUVWXY"

logging:
  level:
    root: INFO
    com.jvxi.unity: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/cat-tool.log
    max-size: 10MB
    max-history: 30
