<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; background-color: #f4f5f7; font-family: 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f5f7; padding: 40px 0;">
        <tr>
            <td align="center">
                <table width="500" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
                    
                    <!-- 头部 Logo -->
                    <tr>
                        <td style="background: linear-gradient(135deg, #fb923c, #f97316); padding: 30px; text-align: center;">
                            <img src="cid:catLogo" alt="猫爪工具" width="80" height="80" style="display: block; margin: 0 auto 12px;" />
                            <div style="color: #ffffff; font-size: 22px; font-weight: 700; letter-spacing: 1px;">猫爪工具</div>
                            <div style="color: rgba(255,255,255,0.8); font-size: 12px; margin-top: 4px;">CAT TOOL - 密码重置</div>
                        </td>
                    </tr>
                    
                    <!-- 内容区 -->
                    <tr>
                        <td style="padding: 35px 40px;">
                            <div style="font-size: 16px; color: #1e293b; font-weight: 600; margin-bottom: 20px;">
                                您好，正在重置您的密码
                            </div>
                            
                            <div style="font-size: 14px; color: #64748b; line-height: 1.8; margin-bottom: 25px;">
                                您正在重置猫爪工具账号密码，以下是您的验证码，请在 <span style="color: #ef4444; font-weight: 600;">3分钟</span> 内完成验证：
                            </div>
                            
                            <!-- 验证码卡片 -->
                            <div style="background: linear-gradient(135deg, #fff7ed, #ffedd5); border: 2px dashed #f97316; border-radius: 12px; padding: 25px; text-align: center; margin-bottom: 25px;">
                                <div style="font-size: 12px; color: #ea580c; margin-bottom: 10px; letter-spacing: 2px;">重置验证码</div>
                                <div style="font-size: 36px; font-weight: 800; color: #7c2d12; letter-spacing: 8px; font-family: 'Courier New', monospace;">${CODE}</div>
                            </div>
                            
                            <!-- 提示信息 -->
                            <div style="background-color: #f8fafc; border-radius: 8px; padding: 15px 20px; margin-bottom: 20px;">
                                <div style="font-size: 13px; color: #475569; line-height: 1.8;">
                                    温馨提示：<br/>
                                    &bull; 验证码有效期为3分钟，请尽快使用<br/>
                                    &bull; 如非本人操作，请立即修改密码并联系客服<br/>
                                    &bull; 请勿将验证码泄露给他人
                                </div>
                            </div>
                        </td>
                    </tr>
                    
                    <!-- 底部 -->
                    <tr>
                        <td style="background-color: #f8fafc; padding: 20px 40px; text-align: center; border-top: 1px solid #e2e8f0;">
                            <div style="font-size: 12px; color: #94a3b8; line-height: 1.6;">
                                此邮件由系统自动发送，请勿直接回复<br/>
                                &copy; 2026 猫爪工具 Cat Tool. All rights reserved.
                            </div>
                        </td>
                    </tr>
                    
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
